<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sneaker List">
  <meta name="theme-color" content="#FAF9F6">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
  <link rel="shortcut icon" href="icons/favicon.ico">
  <link rel="manifest" href="manifest.json">
  <title>Sneaker List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="hdr">
    <div class="hdr-inner">
      <div class="hdr-left">
        <h1 class="hdr-title">Sneaker List <span class="hdr-slash">/</span> <span class="hdr-sub">Bucket List</span></h1>
      </div>
      <div class="hdr-right">
        <span class="hdr-stat"><span id="cntAll" class="hdr-num">0</span> total</span>
        <span class="hdr-stat"><span id="cntCopped" class="hdr-num">0</span> bought</span>
      </div>
    </div>
  </header>

  <!-- ===== PILLS ===== -->
  <div class="pills-bar">
    <div class="pills-inner">
      <div class="pills" id="filterPills">
        <button class="pill active" data-filter="all">All</button>
        <button class="pill" data-brand="Nike">Nike</button>
        <button class="pill" data-brand="Adidas">Adidas</button>
        <button class="pill" data-brand="Puma">Puma</button>
        <button class="pill" data-brand="On">On</button>
        <span class="pill-sep"></span>
        <button class="pill" data-filter="want">Want</button>
        <button class="pill" data-filter="copped">Bought</button>
        <button class="pill" data-filter="maybe">Maybe</button>
      </div>
    </div>
  </div>

  <!-- ===== LIST ===== -->
  <main class="list-wrap">
    <div class="list" id="list"></div>
    <div class="empty hidden" id="empty">
      <span class="empty-emoji">👟</span>
      <p class="empty-title">Nothing here</p>
      <p class="empty-sub">Add a sneaker to start your list</p>
    </div>
  </main>

  <!-- ===== DETAIL SHEET ===== -->
  <div class="sheet-overlay hidden" id="detailOverlay">
    <div class="sheet">
      <div class="sheet-bar"><div class="sheet-handle"></div></div>
      <div class="sheet-scroll" id="detailBody"></div>
    </div>
  </div>

  <!-- ===== EDIT SHEET ===== -->
  <div class="sheet-overlay hidden" id="editOverlay">
    <div class="sheet">
      <div class="sheet-bar"><div class="sheet-handle"></div></div>
      <div class="sheet-scroll">
        <div class="sheet-head">
          <button class="close-btn" id="editClose">&times;</button>
          <h2 class="sheet-title" id="editTitle">Add Sneaker</h2>
          <button class="save-btn" id="editSave">Save</button>
        </div>
        <form id="editForm" class="form">
          <label class="field"><span>Name</span><input type="text" id="fName" placeholder="e.g. Air Max Plus" required></label>
          <label class="field"><span>Brand</span>
            <select id="fBrand" required>
              <option value="">Pick one</option>
              <option>Nike</option><option>Adidas</option><option>Puma</option><option>On</option><option>New Balance</option><option>Other</option>
            </select>
          </label>
          <label class="field"><span>Image URL</span><input type="url" id="fImage" placeholder="https://..."></label>
          <div class="field-row">
            <label class="field half"><span>Price (AUD)</span><input type="number" id="fPrice" placeholder="0" step="0.01"></label>
            <label class="field half"><span>Size</span><input type="text" id="fSize" placeholder="US 10"></label>
          </div>
          <label class="field"><span>Store</span><input type="text" id="fStore" placeholder="e.g. Nike Australia"></label>
          <label class="field"><span>Store Link</span><input type="url" id="fLink" placeholder="https://..."></label>
          <label class="field"><span>Colors</span><input type="text" id="fColors" placeholder="White, Black, Grey"></label>
          <div class="field"><span>Status</span>
            <div class="seg" id="fStatus">
              <button type="button" class="seg-btn active" data-v="want">Want</button>
              <button type="button" class="seg-btn" data-v="copped">Bought</button>
              <button type="button" class="seg-btn" data-v="maybe">Maybe</button>
            </div>
          </div>
          <div class="field hidden" id="fCoppedDateWrap"><span>Date Purchased</span><input type="date" id="fCoppedDate"></div>
          <div class="field hidden" id="fPricePaidWrap"><span>Price Paid (AUD)</span><input type="number" id="fPricePaid" placeholder="0" step="0.01"></div>
          <div class="field"><span>Priority</span>
            <div class="stars" id="fPriority">
              <button type="button" class="star" data-v="1">1</button>
              <button type="button" class="star" data-v="2">2</button>
              <button type="button" class="star active" data-v="3">3</button>
              <button type="button" class="star" data-v="4">4</button>
              <button type="button" class="star" data-v="5">5</button>
            </div>
            <small class="hint">1 = nice to have &middot; 5 = need it</small>
          </div>
          <label class="field"><span>Notes</span><textarea id="fNotes" placeholder="Why do you want these?" rows="3"></textarea></label>
          <button type="button" class="danger-btn hidden" id="deleteBtn">Remove from list</button>
        </form>
      </div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
